# LLM Provider Configuration
# Non-sensitive defaults - override via environment variables or .env

providers:
  minimax:
    model: MiniMax-M2.7
    base_url: https://api.minimaxi.com/anthropic
    # Token pricing (per 1K tokens)
    pricing:
      input: 0.01
      output: 0.01
      cache_write: 0.01
      cache_read: 0.0001

  anthropic:
    model: claude-sonnet-4-6
    base_url: https://api.anthropic.com
    pricing:
      input: 0.003
      output: 0.015
      cache_write: 0.00375
      cache_read: 0.0003

  deepseek:
    model: deepseek-chat
    base_url: https://api.deepseek.com/anthropic
    pricing:
      input: 0.00027
      output: 0.0011

# Default provider
default: minimax
