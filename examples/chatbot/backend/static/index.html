<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentForge Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.tool-call {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
        }

        .chat-input {
            padding: 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            border-color: #667eea;
        }

        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .chat-input button:hover {
            transform: scale(1.05);
        }

        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tool-call-badge {
            display: inline-block;
            background: #e8e8ff;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 AgentForge Chatbot</h1>
            <p>Powered by FastAPI + WebSocket</p>
        </div>

        <div class="chat-messages" id="messages">
            <div class="message assistant">
                <div class="message-content">
                    <div class="tool-call-badge">System</div>
                    <br>Hello! I'm your AI assistant. How can I help you today?
                </div>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        let ws = null;
        let usingWebSocket = false;

        function appendMessage(content, isUser = false, toolCallName = null) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'assistant'}`;

            let toolBadge = '';
            if (toolCallName) {
                toolBadge = '<div class="tool-call-badge">⧖ ' + toolCallName + '</div><br>';
            }

            div.innerHTML = `<div class="message-content">${toolBadge}${escapeHtml(content)}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = 'loading';
            div.className = 'loading';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        async function sendMessage(message = null) {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const text = message || input.value.trim();

            if (!text) return;

            // Disable input while loading
            input.value = '';
            btn.disabled = true;

            // Show user message
            appendMessage(text, true);

            // Show loading
            showLoading();

            try {
                if (usingWebSocket && ws && ws.readyState === WebSocket.OPEN) {
                    // Use WebSocket
                    ws.send(JSON.stringify({ message: text }));
                } else {
                    // Fallback to REST API
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });

                    hideLoading();

                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }

                    const data = await response.json();

                    // Show tool calls if any
                    if (data.tool_calls && data.tool_calls.length > 0) {
                        data.tool_calls.forEach(tc => {
                            appendMessage(`Tool used: ${tc.name}`, false, tc.name);
                        });
                    }

                    // Show response
                    appendMessage(data.response);
                }
            } catch (error) {
                hideLoading();
                appendMessage('Error: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + window.location.host + '/ws/chat');

            ws.onopen = () => {
                console.log('WebSocket connected');
                usingWebSocket = true;
            };

            ws.onmessage = (event) => {
                hideLoading();
                const data = JSON.parse(event.data);

                if (data.type === 'response') {
                    if (data.tool_calls && data.tool_calls.length > 0) {
                        data.tool_calls.forEach(tc => {
                            appendMessage(`Tool used: ${tc.name}`, false, tc.name);
                        });
                    }
                    appendMessage(data.content);
                } else if (data.type === 'error') {
                    appendMessage(data.content);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                usingWebSocket = false;
                // Reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                usingWebSocket = false;
            };
        }

        // Initialize WebSocket connection
        connectWebSocket();
    </script>
</body>
</html>
